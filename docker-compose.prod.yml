services:
  eventmanagementbackend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env.prod
    ports:
      - 127.0.0.1:5000:5000
    command: node dist/index.js

  eventmanagementdatabase:
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - 5432

  eventmanagementadminer:
    ports:
      - 127.0.0.1:8080:8080
